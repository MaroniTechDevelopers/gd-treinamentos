<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Treinamentos G&D — Grupo Maroni</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Segoe UI',Arial,sans-serif;background:#f0f2f5;min-height:100vh;color:#111827;-webkit-font-smoothing:antialiased}

/* ── LAYOUT ── */
.page{max-width:880px;margin:0 auto;padding:0 16px 80px}

/* ── APP BAR ── */
.app-bar{background:#111827;height:58px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(245,200,0,.15)}
.app-bar-left{display:flex;align-items:center;gap:10px}
.app-bar-title{font-size:.88rem;font-weight:700;color:#f5c800;letter-spacing:.01em}
.app-bar-user{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);padding:5px 12px;border-radius:20px;font-size:.78rem;color:#fff;cursor:pointer;transition:background .15s}
.app-bar-user:hover{background:rgba(255,255,255,.14)}
.av{width:28px;height:28px;border-radius:50%;background:#f5c800;color:#111827;display:flex;align-items:center;justify-content:center;font-size:.66rem;font-weight:800;flex-shrink:0}

/* ── CARDS ── */
.card{background:#fff;border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.04)}
.card-title{font-size:.93rem;font-weight:700;margin-bottom:16px;color:#111827}

/* ── BOTÕES ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 18px;border-radius:9px;border:none;font-size:.84rem;font-weight:600;cursor:pointer;transition:all .15s;text-decoration:none;white-space:nowrap;letter-spacing:.01em;font-family:inherit}
.btn-yellow{background:#f5c800;color:#111827}
.btn-yellow:hover{background:#e6ba00;box-shadow:0 2px 8px rgba(245,200,0,.35)}
.btn-dark{background:#111827;color:#fff}
.btn-dark:hover{background:#1f2937}
.btn-outline{background:#fff;color:#374151;border:1.5px solid #e5e7eb}
.btn-outline:hover{background:#f9fafb;border-color:#d1d5db}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:7px 13px;font-size:.77rem}
.btn-lg{padding:14px 24px;font-size:.95rem;font-weight:700}
.btn-full{width:100%}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}

/* ── FORMS ── */
.fg{margin-bottom:14px}
.fl{display:block;font-size:.72rem;font-weight:600;color:#6b7280;margin-bottom:5px;letter-spacing:.01em}
.fc{width:100%;padding:11px 13px;border:1.5px solid #e5e7eb;border-radius:9px;font-size:.9rem;background:#f9fafb;transition:border-color .2s,background .2s,box-shadow .2s;color:#111827;font-family:inherit}
.fc:focus{outline:none;border-color:#f5c800;background:#fff;box-shadow:0 0 0 3px rgba(245,200,0,.15)}
.fc-err{border-color:#dc2626!important}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.f-row{grid-template-columns:1fr}}
.field-error{color:#dc2626;font-size:.71rem;margin-top:3px;display:none}
.field-error.show{display:block}

/* ── BADGES ── */
.badge{display:inline-block;padding:4px 11px;border-radius:99px;font-size:.67rem;font-weight:700;letter-spacing:.02em}
.badge-agendado{background:#dbeafe;color:#1e40af}
.badge-andamento{background:#fef3c7;color:#92400e}
.badge-encerrado{background:#d1fae5;color:#065f46}
.badge-cancelado{background:#fee2e2;color:#991b1b}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stats-row-4{grid-template-columns:repeat(4,1fr)}
.stats-row-5{grid-template-columns:repeat(5,1fr)}
@media(max-width:480px){.stats-row-4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.stats-row-5{grid-template-columns:repeat(3,1fr)}}
@media(max-width:400px){.stats-row-5{grid-template-columns:repeat(2,1fr)}}
.app-bar-back{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.22);color:#fff;border-radius:8px;padding:5px 13px;cursor:pointer;font-size:.8rem;font-weight:700;letter-spacing:.02em;transition:background .15s;font-family:inherit;line-height:1}
.app-bar-back:hover{background:rgba(255,255,255,.22)}
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-bar input,.filter-bar select{padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:9px;font-size:.82rem;background:#fff;color:#111827;font-family:inherit;flex:1;min-width:150px}
.filter-bar input:focus,.filter-bar select:focus{outline:none;border-color:#f5c800;box-shadow:0 0 0 3px rgba(245,200,0,.15)}
.status-bar-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.status-bar-pill{font-size:.73rem;font-weight:600;padding:5px 12px;border-radius:20px;cursor:pointer;transition:opacity .15s;border:none;font-family:inherit}
.status-bar-pill:hover{opacity:.75}
.stat-box{background:#fff;border-radius:13px;padding:16px 12px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.04);text-align:center}
.stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:1rem}
.stat-num{font-size:1.75rem;font-weight:800;line-height:1}
.stat-lbl{font-size:.65rem;font-weight:600;color:#9ca3af;margin-top:4px;text-transform:uppercase;letter-spacing:.05em}

/* ── LISTA DE TREINAMENTOS ── */
.t-item{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.05),0 0 0 1px rgba(0,0,0,.04);display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .12s,box-shadow .15s;border-left:3px solid #e5e7eb}
.t-item:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.09),0 0 0 1px rgba(0,0,0,.04)}
.t-item[data-status="agendado"]{border-left-color:#3b82f6}
.t-item[data-status="andamento"]{border-left-color:#f5c800}
.t-item[data-status="encerrado"]{border-left-color:#10b981}
.t-item[data-status="cancelado"]{border-left-color:#ef4444}
.t-date{background:#111827;color:#f5c800;border-radius:9px;padding:8px 10px;text-align:center;flex-shrink:0;min-width:48px}
.t-date-d{font-size:1.35rem;font-weight:800;line-height:1}
.t-date-m{font-size:.58rem;text-transform:uppercase;letter-spacing:.12em}
.t-info{flex:1;min-width:0}
.t-titulo{font-weight:700;font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#111827}
.t-meta{font-size:.73rem;color:#9ca3af;margin-top:2px}
.t-cnt{text-align:right;flex-shrink:0;font-size:1.15rem;font-weight:800;color:#111827}
.t-cnt small{display:block;font-size:.62rem;color:#d1d5db;font-weight:500}

/* ── SECTION HEADER ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:18px 0 10px}
.sec-hdr h2{font-size:.88rem;font-weight:700;color:#374151}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(145deg,#f0f2f5 0%,#e8eaed 100%)}
.login-card{background:#fff;border-radius:18px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.1),0 0 0 1px rgba(0,0,0,.05);overflow:hidden}
.login-card-header{background:#f5c800;padding:22px 24px 20px}
.login-card-body{padding:22px 24px 26px}
.g-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:10px;cursor:pointer;transition:background .15s;margin-bottom:5px;border:1.5px solid transparent}
.g-item:hover{background:#fffbeb;border-color:#f5c800}
.g-av{width:38px;height:38px;border-radius:50%;background:#111827;color:#f5c800;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;flex-shrink:0}
.g-nome{font-weight:700;font-size:.87rem;color:#111827}
.g-sub{font-size:.71rem;color:#9ca3af}

/* ── QR ── */
.qr-wrap{display:flex;flex-direction:column;align-items:center;padding:18px;background:#fff;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.04);margin-bottom:14px}
#qrcode canvas,#qrcode img{border-radius:6px}
.qr-url{font-size:.65rem;color:#d1d5db;word-break:break-all;text-align:center;max-width:240px;margin-top:6px}

/* ── TABELA PRESENÇA ── */
.p-table{width:100%;border-collapse:collapse;font-size:.82rem}
.p-table th{background:#111827;color:#f5c800;padding:10px 12px;text-align:left;font-weight:600;white-space:nowrap;font-size:.73rem;letter-spacing:.04em}
.p-table td{padding:10px 12px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.p-table tr:last-child td{border-bottom:none}
.p-table tr:hover td{background:#f9fafb}
.assin-img{width:72px;height:28px;object-fit:contain;cursor:zoom-in;border:1px solid #e5e7eb;border-radius:4px}

/* ── ATA ── */
.ata-info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.ata-info-box{background:#f9fafb;border-radius:10px;padding:12px 14px;border:1px solid #f3f4f6}
.ata-info-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#9ca3af;margin-bottom:3px}
.ata-info-val{font-size:.88rem;font-weight:700;color:#111827}
@media(max-width:480px){.ata-info-grid{grid-template-columns:1fr 1fr}}
.assin-linha{border-bottom:1.5px solid #374151;height:44px;margin-bottom:5px}

/* ── FORM INSCRICAO ── */
.ins-header{background:#111827;padding:14px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.ins-wrap{max-width:520px;margin:0 auto;padding:16px}
.evento-card{background:#111827;color:#fff;border-radius:14px;padding:18px;margin-bottom:14px}
.ev-lbl{font-size:.63rem;text-transform:uppercase;letter-spacing:.09em;color:#f5c800;font-weight:700;margin-bottom:1px}
.ev-val{font-size:.88rem;font-weight:600;margin-bottom:9px}
.ev-val:last-child{margin-bottom:0}
.ev-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;border-top:1px solid rgba(255,255,255,.12);padding-top:12px;margin-top:6px}

/* Canvas assinatura */
.canvas-wrap{border:1.5px solid #e5e7eb;border-radius:10px;background:#fafafa;overflow:hidden;position:relative;touch-action:none}
canvas{display:block;width:100%;height:130px;cursor:crosshair}
.canvas-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;color:#d1d5db;font-size:.8rem}
.btn-clear{background:none;border:none;color:#9ca3af;font-size:.72rem;cursor:pointer;padding:3px 0;text-decoration:underline}

/* Telas estado */
.tela{display:none;text-align:center;padding:48px 20px}
.tela.ativa{display:block}
.tela-icone{font-size:3.5rem;margin-bottom:14px}
.tela h2{font-size:1.15rem;font-weight:800;margin-bottom:8px}
.tela p{font-size:.87rem;color:#6b7280;line-height:1.6}
.tela-ok h2{color:#059669}
.tela-err h2{color:#dc2626}
.spinner{border:3px solid #e5e7eb;border-top-color:#f5c800;border-radius:50%;width:34px;height:34px;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PILLS ── */
.pill{display:inline-flex;align-items:center;gap:5px;background:#f3f4f6;border-radius:99px;padding:4px 11px;font-size:.73rem;color:#4b5563;margin:2px 4px 2px 0;font-weight:500}

/* ── MODAL ── */
.m-back{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(3px)}
.m-box{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.22)}
.m-box h3{font-size:.96rem;font-weight:700;margin-bottom:14px;color:#111827}
.m-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 20px;color:#9ca3af}
.empty-ico{font-size:3rem;margin-bottom:10px}
.empty h3{font-size:.9rem;color:#6b7280;margin-bottom:6px;font-weight:700}
.empty p{font-size:.82rem}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;right:24px;background:#111827;color:#fff;padding:12px 18px;border-radius:12px;font-size:.83rem;font-weight:500;opacity:0;transform:translateY(8px);transition:all .28s;z-index:999;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.25)}
#toast.show{opacity:1;transform:none}

/* ── FAB ── */
.fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:#f5c800;color:#111827;border:none;font-size:1.5rem;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(245,200,0,.45);display:flex;align-items:center;justify-content:center;z-index:90;transition:all .15s}
.fab:hover{transform:scale(1.08);box-shadow:0 6px 22px rgba(245,200,0,.55)}

/* ── UTILS ── */
hr{border:none;border-top:1px solid #f3f4f6;margin:14px 0}
.mt-3{margin-top:12px}
.mt-4{margin-top:16px}
.mb-0{margin-bottom:0}
.sep{display:flex;align-items:center;gap:10px;color:#d1d5db;font-size:.75rem;margin:14px 0}
.sep::before,.sep::after{content:'';flex:1;border-top:1px solid #f3f4f6}
.flex{display:flex}
.gap-2{gap:8px}
.wrap{flex-wrap:wrap}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.text-muted{color:#9ca3af}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

@media print{
  .no-print{display:none!important}
  body{background:#fff}
  .card{box-shadow:none;border:1px solid #e5e7eb}
  .app-bar{display:none}
  .fab{display:none}
}
</style>
</head>

  notionEndpoint:   'https://default8babaf2b248f465198d61e5312fbe0.0a.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/a83dde8e173b44408529c8b633301dcf/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=VPCWLe_N2U2JZqb9A4pjGzlu6Ddw-G-6lZoi9Wt8AF0'
};
function cfg(){ try{ const s=JSON.parse(localStorage.getItem(CFG_KEY)||'{}'); return { presencaEndpoint: s.presencaEndpoint||_DEFAULT_CFG.presencaEndpoint, outlookEndpoint: s.outlookEndpoint||_DEFAULT_CFG.outlookEndpoint, notionEndpoint: s.notionEndpoint||_DEFAULT_CFG.notionEndpoint }; }catch(e){ return {..._DEFAULT_CFG}; } }
function saveCfg(c){ localStorage.setItem(CFG_KEY, JSON.stringify(c)); }

function db(){
  try{ return JSON.parse(localStorage.getItem(DB_KEY)||'null') || {gestores:[],treinamentos:[],presencas:[],atas:[]}; }
  catch(e){ return {gestores:[],treinamentos:[],presencas:[],atas:[]}; }
}
function dbEnsure(d){ if(!d.atas) d.atas=[]; return d; }

function saveDb(d){ localStorage.setItem(DB_KEY, JSON.stringify(d)); }

function uid(){ return Date.now().toString(36)+Math.random().toString(36).substr(2,6); }

function fmtData(s){
  if(!s) return '—';
  const [y,m,d]=s.split('-'); return `${d}/${m}/${y}`;
}

function fmtDataCurta(s){
  if(!s) return {dia:'—',mes:''};
  const meses=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
  const [y,m,d]=s.split('-');
  return {dia:d, mes:meses[parseInt(m,10)-1]||'', ano:y};
}

function iniciais(n){
  if(!n) return '?';
  const p=n.trim().split(' ');
  return p.length===1 ? p[0][0].toUpperCase() : (p[0][0]+p[p.length-1][0]).toUpperCase();
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function statusLabel(s){
  return {agendado:'Agendado',andamento:'Em andamento',encerrado:'Encerrado',cancelado:'Cancelado'}[s||'agendado']||'Agendado';
}

const LOGO_FULL = (h='42px') =>

const S = { gestorId: null, view: 'login', param: null };

function go(view, param){
  S.view = view;
  S.param = param || null;
  render();
  window.scrollTo(0,0);
}

function gestor(){ return db().gestores.find(g => g.id === S.gestorId); }

// ════════════════════════════════════════
//  RENDER PRINCIPAL
// ════════════════════════════════════════
function render(){
  const root = document.getElementById('root');
  switch(S.view){
    case 'login':     root.innerHTML = viewLogin(); break;
    case 'dashboard': root.innerHTML = viewDashboard(); break;
    case 'novo':      root.innerHTML = viewForm(null); break;
    case 'editar':    root.innerHTML = viewForm(S.param); break;
    case 'detalhe':   root.innerHTML = viewDetalhe(S.param); setupQR(); break;
    case 'ata':       root.innerHTML = viewAta(S.param); setupAtaQR(); break;
    case 'config':    root.innerHTML = viewConfig(); break;
    default:          root.innerHTML = viewLogin();
  }
}

// ════════════════════════════════════════
function viewLogin(){
  const gestores = db().gestores;
  return `
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-card-header" style="background:#111827">
        <div style="display:flex;align-items:center;gap:12px">
          <img src="${_LOGO_SRC}" style="height:46px;display:block" alt="Grupo Maroni"/>
          <div>
            <div style="font-size:.68rem;font-weight:700;letter-spacing:.14em;color:#f5c800;text-transform:uppercase;margin-bottom:3px">Grupo Maroni</div>
            <div style="font-size:1rem;font-weight:800;color:#fff;line-height:1.2">Gestão de Treinamentos</div>
            <div style="font-size:.72rem;color:rgba(255,255,255,.45);margin-top:3px;font-weight:500">G&amp;D · Área de Treinamentos</div>
          </div>
        </div>
      </div>
      <div class="login-card-body">
        ${gestores.length ? `
          <p style="font-size:.7rem;color:#9ca3af;margin-bottom:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em">Selecione seu perfil</p>
          ${gestores.map(g=>`
            <div class="g-item" style="position:relative" onclick="loginComo('${g.id}')">
              <div class="g-av">${iniciais(g.nome)}</div>
              <div style="flex:1;min-width:0">
                <div class="g-nome">${esc(g.nome)}</div>
                <div class="g-sub">${esc(g.setor||'')}${g.email?' · '+esc(g.email):''}</div>
              </div>
              <button onclick="event.stopPropagation();excluirPerfil('${g.id}')" title="Excluir perfil" style="background:none;border:none;cursor:pointer;color:#d1d5db;font-size:.9rem;padding:4px 6px;border-radius:6px;transition:color .15s;flex-shrink:0" onmouseover="this.style.color='#dc2626'" onmouseout="this.style.color='#d1d5db'">✕</button>
            </div>`).join('')}
          <div class="sep">ou</div>
        ` : `<p style="font-size:.85rem;color:#6b7280;margin-bottom:18px;line-height:1.6">Nenhum gestor cadastrado. Crie seu perfil para começar.</p>`}
        <button class="btn btn-yellow btn-full btn-lg" onclick="modalNovoGestor()">+ Novo Perfil</button>
      </div>
    </div>
  </div>`;
}

function loginComo(id){
  const g = db().gestores.find(g=>g.id===id);
  if(!g) return;
  if(!g.senha){ S.gestorId=id; go('dashboard'); return; }
  modal(`<h3>Bem-vindo, ${esc(g.nome.split(' ')[0])}</h3>
    <div class="fg" style="margin-top:8px">
      <label class="fl">Senha</label>
      <input id="m-senha-login" class="fc" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')confirmarSenha('${id}')"/>
    </div>
    <div class="m-foot">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-yellow btn-sm" onclick="confirmarSenha('${id}')">Entrar</button>
    </div>`);
  setTimeout(()=>{ const el=document.getElementById('m-senha-login'); if(el) el.focus(); },120);
}

function confirmarSenha(id){
  const d = db();
  const g = d.gestores.find(g=>g.id===id);
  const senha = document.getElementById('m-senha-login')?.value||'';
  if(!g || senha !== g.senha){ toast('Senha incorreta.'); return; }
  if(!g.admin && ADMIN_EMAILS.includes(g.email.toLowerCase())){
    g.admin = true; saveDb(d);
  }
  closeModal(); S.gestorId=id; go('dashboard');
}

function excluirPerfil(id){
  if(!confirm('Excluir este perfil? Esta ação não pode ser desfeita.')) return;
  const d = db();
  d.gestores = d.gestores.filter(g=>g.id!==id);
  saveDb(d);
  if(S.gestorId===id){ S.gestorId=null; }
  render();
}

function tItemHtml(t, d, showGestor){
  const cnt = d.presencas.filter(p=>p.treinamentoId===t.id).length;
  const dt  = fmtDataCurta(t.data);
  const gr  = showGestor ? d.gestores.find(g=>g.id===t.gestorId) : null;
  return `<div class="t-item" data-status="${t.status||'agendado'}" onclick="go('detalhe','${t.id}')">
    <div class="t-date"><div class="t-date-d">${dt.dia}</div><div class="t-date-m">${dt.mes}</div></div>
    <div class="t-info">
      <div class="t-titulo">${esc(t.titulo)}</div>
      <div class="t-meta">${t.horaInicio||''}${t.horaFim?'–'+t.horaFim:''} · ${esc(t.local||'Sem local')}</div>
      ${gr?`<div style="font-size:.73rem;color:#888;margin-top:2px">👤 ${esc(gr.nome)}</div>`:''}
      <div style="margin-top:4px"><span class="badge badge-${t.status||'agendado'}">${statusLabel(t.status)}</span></div>
    </div>
    <div class="t-cnt">${cnt}<small>presença${cnt!==1?'s':''}</small></div>
  </div>`;
}

function viewDashboard(){
  const g = gestor();
  if(!g){ go('login'); return ''; }
  const d = dbEnsure(db());
  const hoje = new Date().toISOString().slice(0,10);

  // ── VISÃO DE GERENTE (admin vê todos os gestores) ──
  if(g.admin){
    // ── Meus dados pessoais ──
    const meus = d.treinamentos.filter(t=>t.gestorId===g.id)
      .sort((a,b)=>(b.data+b.horaInicio).localeCompare(a.data+a.horaInicio));
    const meusPrx = meus.filter(t=>t.data>=hoje&&t.status!=='encerrado').length;
    const meusP   = meus.reduce((acc,t)=>acc+d.presencas.filter(p=>p.treinamentoId===t.id).length,0);

    // ── Dados gerente (todos) ──
    const todos = d.treinamentos.slice().sort((a,b)=>(b.data+b.horaInicio).localeCompare(a.data+a.horaInicio));
    const totalP     = d.presencas.length;
    const comAta     = todos.filter(t=>d.atas.some(a=>a.treinamentoId===t.id)).length;
    const semAta     = todos.filter(t=>t.status==='encerrado'&&!d.atas.some(a=>a.treinamentoId===t.id)).length;
    const atrasados  = todos.filter(t=>t.data<hoje&&t.status!=='encerrado'&&t.status!=='cancelado').length;
    const cAgendado  = todos.filter(t=>(t.status||'agendado')==='agendado').length;
    const cAndamento = todos.filter(t=>t.status==='andamento').length;
    const cEncerrado = todos.filter(t=>t.status==='encerrado').length;
    const cCancelado = todos.filter(t=>t.status==='cancelado').length;
    const gestoresAtivos = d.gestores.filter(gg=>todos.some(t=>t.gestorId===gg.id));
    return `
    ${appBar(g)}
    <div class="page" style="padding-top:20px">

      <!-- ── MEUS TREINAMENTOS ── -->

function adminListaHtml(lista, d){
  if(!lista.length) return `<div class="empty"><div class="empty-ico">🔍</div><h3>Nenhum treinamento encontrado</h3><p>Tente ajustar os filtros.</p></div>`;
  const hoje = new Date().toISOString().slice(0,10);
  return lista.map(t=>{
    const gg = d.gestores.find(g=>g.id===t.gestorId);
    const temAta   = d.atas.some(a=>a.treinamentoId===t.id);
    const atrasado = t.data<hoje&&t.status!=='encerrado'&&t.status!=='cancelado';
    const presCount= d.presencas.filter(p=>p.treinamentoId===t.id).length;
    const atrasadoTag = atrasado
      ? `<span style="font-size:.67rem;font-weight:700;color:#dc2626;background:#fee2e2;padding:2px 8px;border-radius:20px">🔴 Atrasado</span>`
      : '';
    const ataBtn = `<button onclick="event.stopPropagation();go('ata','${t.id}')"
        style="background:${temAta?'#d1fae5':'#fef9c3'};border:none;cursor:pointer;padding:5px 11px;border-radius:7px;font-size:.75rem;font-weight:600;color:${temAta?'#065f46':'#92400e'};font-family:inherit;transition:opacity .15s"
        onmouseover="this.style.opacity='.75'" onmouseout="this.style.opacity='1'">
        📄 ${temAta?'Ver Ata':'Gerar Ata'}
      </button>`;
    const presBtn = `<button onclick="event.stopPropagation();go('detalhe','${t.id}')"
        style="background:#f3f4f6;border:none;cursor:pointer;padding:5px 11px;border-radius:7px;font-size:.75rem;font-weight:600;color:#374151;font-family:inherit;transition:opacity .15s"
        onmouseover="this.style.opacity='.75'" onmouseout="this.style.opacity='1'">
        👥 ${presCount} presença${presCount!==1?'s':''}
      </button>`;
    return `<div class="t-item" data-status="${t.status||'agendado'}" onclick="go('detalhe','${t.id}')" style="cursor:pointer">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
            <div class="av" style="width:22px;height:22px;font-size:.58rem;flex-shrink:0">${iniciais(gg?.nome||'?')}</div>
            <span style="font-size:.71rem;color:#6b7280;font-weight:500">${esc(gg?.nome||'—')}</span>
            ${atrasadoTag}
          </div>
          <div style="font-weight:700;color:#111827;font-size:.93rem;line-height:1.3;margin-bottom:6px">${esc(t.titulo)}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <span class="pill" style="font-size:.7rem">📅 ${fmtData(t.data)}</span>
            ${t.horaInicio?`<span class="pill" style="font-size:.7rem">⏰ ${t.horaInicio}</span>`:''}
            ${t.local?`<span class="pill" style="font-size:.7rem">📍 ${esc(t.local)}</span>`:''}
          </div>
        </div>
        <span class="badge badge-${t.status||'agendado'}" style="flex-shrink:0;margin-top:2px">${statusLabel(t.status)}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:9px;border-top:1px solid #f3f4f6">
        ${presBtn}
        ${ataBtn}
      </div>
    </div>`;
  }).join('');
}

function aplicarFiltroAdmin(){
  const d = dbEnsure(db());
  const gestorId = document.getElementById('af-gestor')?.value||'';
  const status   = document.getElementById('af-status')?.value||'';
  const q = (document.getElementById('af-q')?.value||'').toLowerCase().trim();
  let lista = d.treinamentos.slice().sort((a,b)=>(b.data+b.horaInicio).localeCompare(a.data+a.horaInicio));
  if(gestorId) lista = lista.filter(t=>t.gestorId===gestorId);
  if(status)   lista = lista.filter(t=>(t.status||'agendado')===status);
  if(q) lista = lista.filter(t=>{
    const gg = d.gestores.find(g=>g.id===t.gestorId);
    return t.titulo.toLowerCase().includes(q)||(gg?.nome||'').toLowerCase().includes(q)||(t.local||'').toLowerCase().includes(q);
  });
  const el = document.getElementById('admin-lista');
  if(el) el.innerHTML = adminListaHtml(lista, d);
}

function limparFiltrosAdmin(){
  const q=document.getElementById('af-q');
  const g=document.getElementById('af-gestor');
  const s=document.getElementById('af-status');
  if(q)q.value=''; if(g)g.value=''; if(s)s.value='';
  aplicarFiltroAdmin();
}

async function salvarTreinamento(id){
  const titulo = document.getElementById('f-titulo').value.trim();
  const data   = document.getElementById('f-data').value;
  let ok=true;
  if(!titulo){ document.getElementById('e-titulo').classList.add('show'); document.getElementById('f-titulo').classList.add('fc-err'); ok=false; }
  if(!data){   document.getElementById('e-data').classList.add('show');   document.getElementById('f-data').classList.add('fc-err');   ok=false; }
  if(!ok) return;
  const d = db();
  const obj = {
    titulo,data,
    local:      document.getElementById('f-local').value.trim(),
    horaInicio: document.getElementById('f-inicio').value,
    horaFim:    document.getElementById('f-fim').value,
    instrutor:  document.getElementById('f-instrutor').value.trim(),
    descricao:  document.getElementById('f-descricao').value.trim(),
    notionUrl:  document.getElementById('f-notion').value.trim()
  };
  if(id){
    const i = d.treinamentos.findIndex(t=>t.id===id);
    if(i>=0) d.treinamentos[i]={...d.treinamentos[i],...obj};
    saveDb(d); toast('Atualizado!'); go('detalhe',id);
  } else {
    const nt = {id:uid(), gestorId:gestor().id, status:'agendado', criadoEm:new Date().toISOString(), ...obj};
    d.treinamentos.push(nt); saveDb(d);

    // Abre Outlook Web com evento pré-preenchido — cada gestor salva no próprio calendário
    toast('Treinamento criado! Abrindo Outlook para adicionar ao calendário...');
    const startDt = `${obj.data}T${obj.horaInicio||'08:00'}:00`;
    const endDt   = `${obj.data}T${obj.horaFim  ||'09:00'}:00`;
    const corpo   = [obj.instrutor?`Instrutor: ${obj.instrutor}`:'', obj.descricao||''].filter(Boolean).join('\n');
    const outlookComposeUrl = 'https://outlook.office.com/calendar/action/compose?'
      + `subject=${encodeURIComponent(obj.titulo)}`
      + `&startdt=${encodeURIComponent(startDt)}`
      + `&enddt=${encodeURIComponent(endDt)}`
      + (obj.local    ? `&location=${encodeURIComponent(obj.local)}`  : '')
      + (corpo        ? `&body=${encodeURIComponent(corpo)}`           : '');
    window.open(outlookComposeUrl, '_blank');
    go('detalhe', nt.id);
  }
}

      </div>`;
    })()}
    <div style="height:20px"></div>
  </div>`;
}

let _sigDrawing = false, _sigHasData = false;

function setupSig(){
  const c = document.getElementById('sig-canvas');
  if(!c) return;
  const ctx = c.getContext('2d');
  const resize = () => {
    const dpr = window.devicePixelRatio||1;
    const w = c.offsetWidth, h = c.offsetHeight;
    c.width = w*dpr; c.height = h*dpr;
    ctx.scale(dpr,dpr);
    ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.lineJoin='round';
  };
  resize();
  const pos = e => { const r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e; return {x:t.clientX-r.left,y:t.clientY-r.top}; };
  c.onmousedown = e => { _sigDrawing=true; ctx.beginPath(); const p=pos(e); ctx.moveTo(p.x,p.y); };
  c.onmousemove = e => { if(!_sigDrawing)return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); markSig(); };
  c.onmouseup = c.onmouseleave = () => _sigDrawing=false;
  c.ontouchstart = e => { e.preventDefault(); _sigDrawing=true; ctx.beginPath(); const p=pos(e); ctx.moveTo(p.x,p.y); };
  c.ontouchmove  = e => { e.preventDefault(); if(!_sigDrawing)return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); markSig(); };
  c.ontouchend   = () => _sigDrawing=false;
}

function markSig(){
  _sigHasData=true;
  const h=document.getElementById('sig-hint');
  if(h) h.style.display='none';
}

function limparSig(){
  const c=document.getElementById('sig-canvas');
  if(!c) return;
  c.getContext('2d').clearRect(0,0,c.width,c.height);
  _sigHasData=false;
  const h=document.getElementById('sig-hint');
  if(h) h.style.display='flex';
}

// ════════════════════════════════════════
//  CONFIRMAR PRESENÇA (participante)
// ════════════════════════════════════════
async function confirmarPresenca(treinamentoId){
  const nome  = document.getElementById('i-nome').value.trim();
  const mat   = document.getElementById('i-mat').value.trim();
  const email = document.getElementById('i-email').value.trim();
  let ok=true;

  document.querySelectorAll('.field-error').forEach(e=>e.classList.remove('show'));
  document.querySelectorAll('.fc-err').forEach(e=>e.classList.remove('fc-err'));

  if(!nome)  { show('ei-nome'); err('i-nome'); ok=false; }
  if(!mat)   { show('ei-mat');  err('i-mat');  ok=false; }
  if(email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ show('ei-email'); err('i-email'); ok=false; }
  if(!_sigHasData){ show('ei-sig'); ok=false; }
  if(!ok) return;

  const d = db();
  const dup = d.presencas.find(p=>p.treinamentoId===treinamentoId&&((p.matricula&&p.matricula===mat)||(p.email&&email&&p.email===email)));
  if(dup){ mostrarErroIns('Presença já registrada','Você já confirmou presença neste treinamento anteriormente.'); return; }

  // Bloqueia botão e mostra spinner
  const btn = document.getElementById('btn-confirmar');
  if(btn){ btn.disabled=true; btn.innerHTML='<div class="spinner" style="width:20px;height:20px;margin:0;border-width:2px"></div> Registrando...'; }

  const assin        = document.getElementById('sig-canvas').toDataURL('image/png');
  const registradoEm = new Date().toISOString();
  const t            = d.treinamentos.find(t=>t.id===treinamentoId);

  // 1. Salva no localStorage (sempre funciona, inclusive offline)
  d.presencas.push({id:uid(), treinamentoId, nome, matricula:mat, email:email||'', assinatura:assin, registradoEm});
  saveDb(d);

  // 2. Envia para o Power Automate → SharePoint (se configurado)
  const endpoint = cfg().presencaEndpoint;
  if(endpoint){
    try {
      await fetch(endpoint, {
        method : 'POST',
        headers: {'Content-Type':'application/json'},
        body   : JSON.stringify({
          treinamento: t?.titulo   || '',
          data       : t?.data     || '',
          horario    : `${t?.horaInicio||''}–${t?.horaFim||''}`,
          local      : t?.local    || '',
          instrutor  : t?.instrutor|| '',
          nome, matricula:mat, email:email||'',
          timestamp  : registradoEm
        })
      });
    } catch(e){
      console.warn('PA endpoint error:', e.message);
    }
  }

  document.getElementById('ins-form-area').style.display='none';
  document.getElementById('ins-ok-msg').innerHTML =
    `<strong>${esc(nome)}</strong>, sua presença em <strong>"${esc(t?.titulo||'')}"</strong> foi registrada!`
    + (endpoint ? '<br><br>✅ Dados enviados ao SharePoint.' : '')
    + `<br><br>📅 ${fmtData(t?.data||'')} &nbsp;⏰ ${t?.horaInicio||''}–${t?.horaFim||''}`;
  document.getElementById('ins-ok').classList.add('ativa');
}

function mostrarErroIns(titulo, msg){
  document.getElementById('ins-err-titulo').textContent = titulo;
  document.getElementById('ins-err-msg').textContent = msg;
  document.getElementById('ins-err').classList.add('ativa');
}

function buildUrl(treinamentoId){
  const base = location.href.split('?')[0];
  const t = db().treinamentos.find(t=>t.id===treinamentoId);
  const p = new URLSearchParams({inscricao: treinamentoId});
  if(t){
    p.set('tt', t.titulo||'');
    if(t.data)       p.set('td', t.data);
    if(t.horaInicio) p.set('thi', t.horaInicio);
    if(t.horaFim)    p.set('thf', t.horaFim);
    if(t.local)      p.set('tl', t.local);
    if(t.instrutor)  p.set('ti', t.instrutor);
  }
  return `${base}?${p.toString()}`;
}

function setupQR(){
  const el=document.getElementById('qrcode');
  if(!el) return;
  el.innerHTML='';
  const url = buildUrl(S.param);
  if(typeof QRCode==='undefined'){
    el.innerHTML='<div style="width:180px;height:180px;background:#f0f0f0;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.72rem;color:#aaa;text-align:center;padding:10px">QRCode.js<br>não carregou</div>';
    return;
  }
  new QRCode(el,{text:url,width:180,height:180,colorDark:'#1a1a1a',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
}

function copiarLink(){
  const inp=document.getElementById('url-inp');
  if(!inp) return;
  navigator.clipboard.writeText(inp.value).then(()=>toast('Link copiado!')).catch(()=>{inp.select();document.execCommand('copy');toast('Link copiado!');});
}

async function setStatus(id,status){
  const d=db(), t=d.treinamentos.find(t=>t.id===id);
  if(!t) return;
  const g=gestor(); if(!g||g.id!==t.gestorId){ toast('Sem permissão.'); return; }
  t.status=status; saveDb(d); go('detalhe',id); toast('Status atualizado!');

  // Ao iniciar treinamento → cria subitem no Notion (se configurado)
  if(status==='andamento'){
    const notionEp = cfg().notionEndpoint;
    if(!notionEp){
      modal(`<h3>⚠️ Notion</h3><p>Endpoint não configurado.</p><div class="m-foot"><button class="btn btn-outline btn-sm" onclick="closeModal()">OK</button></div>`);
      return;
    }
    if(!t.notionUrl){
      modal(`<h3>⚠️ Notion</h3><p>Este treinamento não tem "Link do Notion" preenchido.</p><div class="m-foot"><button class="btn btn-outline btn-sm" onclick="closeModal()">OK</button></div>`);
      return;
    }
    toast('⏳ Criando subitem no Notion...');
    try {
      const r = await fetch(notionEp, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          titulo    : t.titulo,
          data      : t.data,
          horario   : `${t.horaInicio||''}–${t.horaFim||''}`,
          local     : t.local||'',
          instrutor : t.instrutor||'',
          descricao : t.descricao||'',
          notionUrl : t.notionUrl,
          appUrl    : buildUrl(id)
        })
      });
      modal(`<h3>${r.ok?'✅ Subitem criado no Notion!':'⚠️ Notion respondeu '+r.status}</h3><p style="font-size:.82rem;color:#666">Status HTTP: ${r.status}<br>Notion URL: ${esc(t.notionUrl)}</p><div class="m-foot"><button class="btn btn-yellow btn-sm" onclick="closeModal()">OK</button></div>`);
    } catch(e){
      modal(`<h3>⚠️ Erro ao chamar Notion</h3><p style="font-size:.82rem;color:#666">${esc(e.message||'erro de rede')}<br><br>Notion URL: ${esc(t.notionUrl)}</p><div class="m-foot"><button class="btn btn-outline btn-sm" onclick="closeModal()">OK</button></div>`);
      console.warn('Notion endpoint error:', e);
    }
  }
}

function confirmarExcluir(id){
  modal(`<h3>Excluir Treinamento?</h3>
    <p style="font-size:.87rem;color:#666;margin-top:6px">Esta ação não pode ser desfeita. As presenças também serão removidas.</p>
    <div class="m-foot">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger btn-sm" onclick="excluir('${id}')">Excluir</button>
    </div>`);
}

function excluir(id){
  const d=db();
  const t=d.treinamentos.find(t=>t.id===id);
  if(!t) return;
  const g=gestor(); if(!g||g.id!==t.gestorId){ toast('Sem permissão.'); closeModal(); return; }
  d.treinamentos=d.treinamentos.filter(t=>t.id!==id);
  d.presencas=d.presencas.filter(p=>p.treinamentoId!==id);
  saveDb(d); closeModal(); toast('Excluído.'); go('dashboard');
}

function removerPresenca(pid,tid){
  const d=db();
  d.presencas=d.presencas.filter(p=>p.id!==pid);
  saveDb(d); go('detalhe',tid); toast('Presença removida.');
}

function zoomAssin(pid){
  const p=db().presencas.find(p=>p.id===pid);
  if(!p?.assinatura) return;
  modal(`<h3>${esc(p.nome)}</h3>
    <img src="${p.assinatura}" style="width:100%;border:1px solid #eee;border-radius:8px;margin-top:8px"/>
    <div class="m-foot"><button class="btn btn-outline btn-sm" onclick="closeModal()">Fechar</button></div>`);
}

function exportarCSV(id){
  const d=db(), t=d.treinamentos.find(t=>t.id===id);
  const pres=d.presencas.filter(p=>p.treinamentoId===id);
  if(!pres.length){toast('Sem presenças para exportar.');return;}
  const rows=[['#','Nome','Matrícula','E-mail','Horário']];
  pres.forEach((p,i)=>{
    const hr=p.registradoEm?new Date(p.registradoEm).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'';
    rows.push([i+1,p.nome,p.matricula||'',p.email||'',hr]);
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`presencas_${t?.titulo||id}_${t?.data||''}.csv`;
  a.click(); toast('CSV exportado!');
}

function criarGestor(){
  const nome  = document.getElementById('m-nome').value.trim();
  const email = document.getElementById('m-email').value.trim();
  const senha = document.getElementById('m-senha').value;
  const senha2= document.getElementById('m-senha2').value;
  if(!nome) { toast('Informe seu nome.'); return; }
  if(!email){ toast('Informe seu e-mail.'); return; }
  if(!senha){ toast('Defina uma senha.'); return; }
  if(senha !== senha2){ toast('As senhas não coincidem.'); return; }
  const d=db();
  const isAdmin = ADMIN_EMAILS.includes(email.toLowerCase());
  const g={id:uid(), nome, setor:document.getElementById('m-setor').value.trim(), email, senha, admin:isAdmin};
  d.gestores.push(g); saveDb(d); closeModal();
  S.gestorId=g.id; go('dashboard');
}

function salvarConfig(){
  const url     = document.getElementById('cfg-url')?.value.trim()    || cfg().presencaEndpoint || '';
  const outlook = document.getElementById('cfg-outlook')?.value.trim() || cfg().outlookEndpoint  || '';
  const notion  = document.getElementById('cfg-notion')?.value.trim()  || cfg().notionEndpoint   || '';
  saveCfg({presencaEndpoint: url, outlookEndpoint: outlook, notionEndpoint: notion});
  toast('Configurações salvas!');
  go('dashboard');
}

async function testarOutlook(){
  const url = cfg().outlookEndpoint;
  if(!url){ toast('Nenhuma URL configurada.'); return; }
  toast('Enviando teste ao Outlook...');
  try {
    const r = await fetch(url, {
      method : 'POST',
      headers: {'Content-Type':'application/json'},
      body   : JSON.stringify({
        titulo:'TESTE Treinamento App', dataHoraInicio:'2026-01-15T09:00:00',
        dataHoraFim:'2026-01-15T10:00:00', local:'Sala Teste', instrutor:'Teste',
        descricao:'Evento de teste gerado pelo App G&D', gestorNome:'Teste', gestorEmail:'teste@transmaroni.com.br'
      })
    });
    toast(r.ok ? '✅ Conexão OK! Verifique o histórico no Power Automate.' : `⚠️ Resposta ${r.status}`);
  } catch(e){
    toast('❌ Erro: ' + (e.message||'sem conexão'));
  }
}

async function testarConexao(){
  const url = cfg().presencaEndpoint;
  if(!url){ toast('Nenhuma URL configurada.'); return; }
  toast('Enviando teste ao Power Automate...');
  try {
    const r = await fetch(url, {
      method : 'POST',
      headers: {'Content-Type':'application/json'},
      body   : JSON.stringify({_teste:true, treinamento:'TESTE', data:'2026-01-01', nome:'Teste App', matricula:'00000', email:'teste@transmaroni.com.br', timestamp: new Date().toISOString()})
    });
    toast(r.ok ? '✅ Conexão OK! Verifique o histórico no Power Automate.' : `⚠️ Resposta ${r.status}`);
  } catch(e){
    toast('❌ Erro: ' + (e.message||'sem conexão'));
  }
}

function appBar(g, subtitle){
  let backView=null, backParam=null, backLabel='← Voltar';
  if(S.view==='ata'     ){backView='detalhe';backParam=S.param;backLabel='← Detalhes';}
  else if(S.view==='editar' ){backView='detalhe';backParam=S.param;backLabel='← Detalhes';}
  else if(S.view==='novo'   ){backView='dashboard';backLabel='← Início';}
  else if(S.view==='detalhe'){backView='dashboard';backLabel='← Início';}
  else if(S.view==='config' ){backView='dashboard';backLabel='← Início';}
  const backHtml = backView
    ? `<button class="app-bar-back" onclick="go('${backView}'${backParam?`,'${backParam}'`:''})">${backLabel}</button>`
    : '';
  return `<div class="app-bar no-print">
    <div class="app-bar-left">
      ${backHtml}
      <div onclick="go('dashboard')" style="cursor:pointer;display:flex;align-items:center;gap:9px">
        ${LOGO('white','#1a1a1a','30px')}
        <span class="app-bar-title">${subtitle||'Treinamentos G&D'}</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:4px">
      ${g?`<button onclick="go('config')" title="Configurações Power Automate" style="background:none;border:none;cursor:pointer;padding:5px 8px;border-radius:6px;font-size:1rem;color:${cfg().presencaEndpoint?'#4ade80':'rgba(255,255,255,.5)'}">⚙️</button>`:''}
      ${g?`<div class="app-bar-user" onclick="go('login')"><div class="av">${iniciais(g.nome)}</div></div>`:''}
    </div>
  </div>`;
}

// ════════════════════════════════════════
//  MODAL & TOAST
// ════════════════════════════════════════
function modal(html){
  document.getElementById('modals').innerHTML=`<div class="m-back" onclick="if(event.target===this)closeModal()"><div class="m-box">${html}</div></div>`;
}
function closeModal(){ document.getElementById('modals').innerHTML=''; }

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2600);
}
